{% extends "base.html" %}
{% block title %}New workflow bag{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto p-4">
  <h1 class="text-2xl font-bold mb-4">New workflow bag</h1>
  <p class="mb-4"><a class="text-blue-600 underline" href="{{ url_for('workflow_staff.workflow_reports') }}">Workflow reports</a></p>
  <form method="post" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <div>
      <label class="block text-sm font-medium mb-1">Product</label>
      <select name="product_id" class="form-input">
        {% for p in products %}
        <option value="{{ p['id'] }}">{{ p['product_name'] }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Box #</label>
      <input name="box_number" class="form-input" />
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Bag #</label>
      <input name="bag_number" class="form-input" />
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Receipt #</label>
      <input name="receipt_number" class="form-input" />
    </div>
    <button type="submit" class="btn-primary">Create bag + assign card</button>
  </form>

  <hr class="my-8" />
  <h2 class="text-lg font-semibold mb-2">Admin: force release card</h2>
  <form method="post" action="{{ url_for('workflow_staff.force_release') }}" class="space-y-3">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <input name="workflow_bag_id" class="form-input" placeholder="workflow_bag_id" />
    <input name="qr_card_id" class="form-input" placeholder="qr_card_id" />
    <input name="reason" class="form-input" placeholder="reason" value="stuck_card" />
    <button type="submit" class="btn-secondary">Force release</button>
  </form>
</div>
{% endblock %}
