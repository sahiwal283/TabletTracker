<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Pill packing command center · TabletTracker</title>
  <link rel="icon" href="{{ url_for('static', filename='img/favicon.svg') }}?v={{ app_version }}" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/mes-command-center.css') }}?v={{ app_version }}">
</head>
<body class="mes-body">
  <script type="application/json" id="mes-nav-boot">{{ mes_nav_boot | tojson }}</script>
  <div id="mes-root" data-snapshot-url="{{ snapshot_api_url }}" role="application" aria-label="Pill packing command center"></div>
  <script type="application/json" id="ops-tv-initial-data">{{ initial_snapshot | tojson }}</script>
  <script type="module" src="{{ url_for('static', filename='js/mes/command-center-app.js') }}?v={{ app_version }}"></script>
</body>
</html>
