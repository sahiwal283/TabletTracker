<!DOCTYPE html>
<html lang="en" class="ops-tv-wall">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operations TV · TabletTracker</title>
  <link rel="icon" href="{{ url_for('static', filename='img/favicon.svg') }}?v={{ app_version }}" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}?v={{ app_version }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/ops-tv.css') }}?v={{ app_version }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
</head>
<body>
  <div
    id="ops-root"
    class="ops-root"
    data-snapshot-url="{{ snapshot_api_url }}"
    role="application"
    aria-label="Live operations dashboard"
  >
    <header class="ops-top">
      <div class="ops-brand-strip">
        <div class="ops-brand-left">
          <div class="ops-title-line">
            <span class="ops-cc-title">TabletTracker</span>
            <span class="ops-live" aria-live="polite"><span class="ops-live-dot" aria-hidden="true"></span>LIVE</span>
          </div>
          <p class="ops-cc-subtitle">Operations command center · live floor telemetry</p>
        </div>
        <div class="ops-brand-right">
          <span id="ops-clock" class="ops-clock"></span>
          <span id="ops-last-refresh" class="ops-last-refresh"></span>
          <a class="ops-exit" href="{{ command_center_url }}">Command Center</a>
        </div>
      </div>
      <div class="ops-head" id="ops-head"></div>
    </header>

    <div class="ops-mid">
      <div class="ops-mid-primary">
        <section class="ops-flow-wrap" aria-label="Production flow">
          <div id="ops-flow" class="ops-flow"></div>
          <div id="ops-bottleneck" class="ops-bottleneck"></div>
        </section>
        <section class="ops-cards" id="ops-cards" aria-label="Machine status"></section>
      </div>
      <aside class="ops-feed" aria-label="Alerts and activity">
        <h2 class="ops-feed-title">Alerts</h2>
        <div class="ops-feed-list" id="ops-feed-list"></div>
      </aside>
    </div>

    <footer class="ops-charts">
      <div class="ops-chart-row-main">
        <div class="ops-chart-panel panel-cum">
          <h3>Displays cumulative · vs 30d pace</h3>
          <canvas id="c-chart-line"></canvas>
        </div>
        <div class="ops-chart-panel panel-multi">
          <h3>Displays per hour · top packaging stations</h3>
          <canvas id="c-chart-multi"></canvas>
        </div>
      </div>
      <div class="ops-chart-row-sub">
        <div class="ops-chart-panel panel-bar">
          <h3>Output by station (today)</h3>
          <p class="ops-chart-note">Packaging = displays finalized · Blister / sealing = tablets</p>
          <canvas id="c-chart-bar"></canvas>
        </div>
        <div class="ops-chart-stack">
          <div class="ops-chart-panel panel-idle">
            <h3>Engaged vs idle</h3>
            <canvas id="c-chart-idle"></canvas>
          </div>
          <div class="ops-chart-panel panel-donut">
            <h3>Product mix</h3>
            <canvas id="c-chart-donut"></canvas>
          </div>
        </div>
      </div>
    </footer>
  </div>
  <script src="{{ url_for('static', filename='js/ops-tv.js') }}?v={{ app_version }}" defer></script>
</body>
</html>
