{% extends "base.html" %}

{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="tt-login-surface tt-auth-page">
    <div class="max-w-md w-full mx-4">
        <div class="text-center mb-8">
            <p class="tt-kicker mb-2">Secure access</p>
            <h1 class="text-3xl font-semibold tracking-tight text-slate-900">Admin sign-in</h1>
            <p class="text-sm text-slate-500 mt-2">Environment password required</p>
        </div>

        <div class="card tt-card-elevated p-8">
            <form method="POST" action="/admin/login" class="space-y-5">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-2">
                        Admin password
                    </label>
                    <input type="password" id="password" name="password" required
                           class="form-input" placeholder="Enter admin password" autofocus>
                </div>

                <button type="submit" class="w-full btn-primary py-4 text-base font-semibold">
                    Access admin panel
                </button>
            </form>

            <div class="mt-8 text-center">
                <a href="/" class="text-sm font-medium text-[var(--wc-primary)] hover:underline">← Back to home</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
