{% extends "base.html" %}

{% block title %}Employee Login{% endblock %}

{% block content %}
<div class="tt-login-surface tt-auth-page">
    <div class="max-w-md w-full mx-4">
        <div class="text-center mb-8">
            <p class="tt-kicker mb-3">Floor &amp; office</p>
            <div class="mb-4 flex justify-center">
                <div class="rounded-2xl bg-white/80 p-4 shadow-md border border-slate-200/80">
                    <svg class="w-14 h-14 text-[var(--wc-primary)]" aria-hidden="true"><use href="#icon-user-helmet" /></svg>
                </div>
            </div>
            <h1 class="text-3xl font-semibold tracking-tight text-slate-900 mb-2">Employee sign-in</h1>
            <p class="text-slate-600">Production and warehouse access</p>
        </div>

        <div class="card tt-card-elevated hover-lift p-8">
            <form method="POST" class="space-y-6">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-700 mb-2">
                        <span class="flex items-center gap-2">
                            <svg class="w-4 h-4 text-[var(--wc-primary)]" aria-hidden="true"><use href="#icon-user" /></svg>
                            Username
                        </span>
                    </label>
                    <input type="text" id="username" name="username" required
                           class="form-input" placeholder="Enter your username" autofocus>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-2">
                        <span class="flex items-center gap-2">
                            <svg class="w-4 h-4 text-[var(--wc-primary)]" aria-hidden="true"><use href="#icon-lock" /></svg>
                            Password
                        </span>
                    </label>
                    <input type="password" id="password" name="password" required
                           class="form-input" placeholder="Enter your password">
                </div>

                <button type="submit" class="w-full btn-primary py-4 text-lg font-semibold flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" aria-hidden="true"><use href="#icon-login" /></svg>
                    Sign in
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-sm text-slate-500">
                    <a href="{{ url_for('auth.index') }}" class="font-medium text-[var(--wc-primary)] hover:underline">← Back to unified login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
