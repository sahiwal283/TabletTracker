<div class="tt-section-title-wrap flex items-center flex-wrap {{ wrapper_class|default('') }}">
    {% if icon_symbol %}
    <span class="{{ icon_class|default('text-2xl mr-3') }}">{{ icon_symbol }}</span>
    {% endif %}
    {% if icon_svg %}
    <svg class="{{ icon_svg_class|default('w-6 h-6 mr-3') }}" aria-hidden="true"><use href="{{ icon_svg }}" /></svg>
    {% endif %}
    <h3 class="{{ title_class|default('text-xl font-semibold tracking-tight text-slate-900') }}">{{ title }}</h3>
    {% if subtitle %}
    <span class="{{ subtitle_class|default('ml-3 text-sm font-medium text-slate-500') }}">{{ subtitle }}</span>
    {% endif %}
</div>
