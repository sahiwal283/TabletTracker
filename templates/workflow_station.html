{% extends "base.html" %}
{% block title %}Workflow station{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto p-4">
  <h1 class="text-2xl font-bold mb-4">Station</h1>
  <p class="text-sm text-gray-600 mb-4">Token in URL. Scan card QR or enter values below.</p>
  <div id="wf-status" class="mb-4 p-3 rounded border bg-gray-50 text-sm"></div>
  <label class="block text-sm font-medium mb-1">Card token</label>
  <input id="wf-card-token" class="form-input mb-3" placeholder="dev-card-1" autocomplete="off" />
  <input type="hidden" id="wf-station-token" value="{{ station_token }}" />
  <div class="flex flex-wrap gap-2 mb-4">
    <button type="button" id="wf-refresh" class="btn-secondary px-4 py-2">Load bag</button>
    <button type="button" id="wf-blister" class="btn-secondary px-4 py-2">Blister done</button>
    <button type="button" id="wf-seal" class="btn-secondary px-4 py-2">Sealing done</button>
    <button type="button" id="wf-pack" class="btn-secondary px-4 py-2">Packaging</button>
    <button type="button" id="wf-finalize" class="btn-primary px-4 py-2">Finalize</button>
  </div>
  <p class="text-xs text-gray-500">device_id is generated in localStorage for log correlation only.</p>
</div>
<script src="{{ url_for('static', filename='js/workflow-ui.js') }}"></script>
<script>
  window.WF_STATION_TOKEN = {{ station_token | tojson }};
  window.WF_STATION_ID = {{ station_id | int }};
</script>
{% endblock %}
