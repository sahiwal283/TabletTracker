# Example fragment for nginx (e.g. container 104).
# If nginx runs on the host and TabletTracker publishes 7620:8000, use 127.0.0.1:7620.
# If nginx is on the same Docker network as the tablettracker service, use:
#   proxy_pass http://tablettracker:8000;

upstream tablettracker_backend {
    server 127.0.0.1:7620;
    keepalive 32;
}

server {
    listen 443 ssl;
    # server_name tablet.example.internal;

    location / {
        proxy_pass http://tablettracker_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        # If the app is mounted under a subpath, set prefix and APPLICATION_ROOT in Flask to match:
        # proxy_set_header X-Forwarded-Prefix /tablet;
    }
}
